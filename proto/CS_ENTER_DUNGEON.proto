syntax = "proto3";

import "ENTER_RACING_DUNGEON_PARAM.proto";
import "ENTER_WEEK_RAID_PARAM.proto";
import "TEAM_CHAR_ID.proto";

message CS_ENTER_DUNGEON {
  repeated TEAM_CHAR_ID char_team = 1;
  string dungeon_id = 2;
  oneof enter_param {
    ENTER_RACING_DUNGEON_PARAM racing_param = 21;
    ENTER_WEEK_RAID_PARAM week_raid_param = 22;
  }
}
