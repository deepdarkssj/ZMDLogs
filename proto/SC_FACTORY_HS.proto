syntax = "proto3";

import "SCD_FACTORY_HS_BB.proto";
import "SCD_FACTORY_HS_CE.proto";
import "SCD_FACTORY_HS_CT.proto";
import "SCD_FACTORY_HS_FB.proto";

message SC_FACTORY_HS {
