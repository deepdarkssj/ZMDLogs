syntax = "proto3";

import "SCD_FACTORY_STATISTIC_BOOKMARK.proto";
import "SCD_FACTORY_SYNC_HUB_TRANSPORT_ROUTE_MANAGER.proto";
import "SCD_FACTORY_SYNC_PANEL_STORE.proto";
import "SCD_FACTORY_SYNC_SHARED_MGR.proto";
import "SCD_FACTORY_SYNC_SIGN_MGR.proto";

message SC_FACTORY_SYNC_SCOPE {
  int32 scope_name = 1;
  string current_chapter_id = 2;
  repeated string active_chapter_ids = 3;
  SCD_FACTORY_SYNC_HUB_TRANSPORT_ROUTE_MANAGER transport_route = 5;
  SCD_FACTORY_STATISTIC_BOOKMARK book_mark = 6;
  SCD_FACTORY_SYNC_PANEL_STORE panel_store = 6;
  SCD_FACTORY_SYNC_SIGN_MGR sign_mgr = 7;
  SCD_FACTORY_SYNC_SHARED_MGR shared_mgr = 8;
}
