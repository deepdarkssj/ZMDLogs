syntax = "proto3";

import "BATTLE_BLACKBOARD.proto";
import "TEMPLATE_ID.proto";

message SERVER_BUFF {
  TEMPLATE_ID buff_id = 1;
  uint64 inst_id = 2;
  BATTLE_BLACKBOARD blackboard = 3;
  int64 duration = 4;
  double priority = 5;
  int32 enhance_multi = 6;
  bool is_server_init = 7;
  bool is_enable = 8;
  string stacking_group_id = 9;
}
