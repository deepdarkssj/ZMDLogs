syntax = "proto3";

import "CSD_FACTORY_INTERACTIVE_PARAM.proto";
import "SCD_VEC3_INT.proto";

message CSD_BLUE_PRINT_TRANSFORM {
  SCD_VEC3_INT position = 1;
  SCD_VEC3_INT direction = 2;
  CSD_FACTORY_INTERACTIVE_PARAM interactive_param = 3;
  SCD_VEC3_INT direction_in = 4;
  SCD_VEC3_INT direction_out = 5;
  repeated SCD_VEC3_INT points = 6;
}
